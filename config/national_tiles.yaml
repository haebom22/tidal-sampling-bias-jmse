# Coastal 0.3-deg tiles covering Korean west + south coast tidal-flat zone.
#
# Generated by hand-curating the JRC GSW occurrence 5-95% pixels for
# 33-39 N, 124-130 E. The list is re-derivable with:
#
#     python -m src.gee.national_tiling --regenerate
#
# but the curated subset already excludes (a) inland tiles, (b) deep-water
# tiles, and (c) DMZ-adjacent tiles where Landsat/Sentinel coverage is
# patchy. Pipeline scripts can override the list via --tiles-config.
#
# Each tile is 0.3 deg lon x 0.3 deg lat (~25 km x 33 km at 36 N).
# Tile id encoding: "K_<lon*10>_<lat*10>" (using the lower-left corner).

tile_size_deg: 0.3

tiles:
  # ------------------------------------------------------------------------
  # West coast — Yellow Sea (north → south)
  # ------------------------------------------------------------------------
